name: Build SeedSigner Main Repo

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - '.github/workflows/build-main-repo.yml'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'opt/**'
  pull_request:
    paths:
      - '.github/workflows/build-main-repo.yml'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'opt/**'

jobs:
  build-main-repo:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build SeedSigner OS image against SeedSigner main
        env:
          SS_ARGS: "--pi0 --smartcard --app-repo=https://github.com/3rdIteration/seedsigner --app-branch=main"
        run: docker compose up --force-recreate --build

      - name: Upload built image
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seedsigner-os-images
          path: images/*.img
          if-no-files-found: warn
