name: Build SeedSigner OS

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      app_repo:
        description: 'SeedSigner app repository URL'
        required: false
        default: 'https://github.com/3rdIteration/seedsigner'
      app_branch:
        description: 'SeedSigner app branch'
        required: false
        default: 'dev'
      release_tag:
        description: 'Release tag to upload artifacts to (e.g. v1.0.0)'
        required: false
        default: ''
      upload_to_release:
        description: 'Upload build artifacts to the release'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build ${{ matrix.config }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - config: pi0-smartcard-dev
            board_flag: --pi0
          - config: pi02w-smartcard-dev
            board_flag: --pi02w
          - config: pi2-smartcard-dev
            board_flag: --pi2
          - config: pi4-smartcard-dev
            board_flag: --pi4
          - config: lafrite-smartcard-dev
            board_flag: --lafrite

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space
        run: |
          echo "Disk usage before cleanup:"
          df -h

          sudo rm -rf \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/lib/android/sdk \
            /usr/share/dotnet
          sudo apt-get clean
          docker system prune --all --force || true

          echo "Disk usage after cleanup:"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ matrix.config }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.config }}-
            ccache-

      - name: Create required directories
        run: |
          mkdir -p images
          mkdir -p buildroot_dl

      - name: Build ${{ matrix.config }}
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
          SS_ARGS: >-
            ${{ matrix.board_flag }}
            --smartcard
            --dev
            --app-repo=${{ inputs.app_repo || 'https://github.com/3rdIteration/seedsigner' }}
            --app-branch=${{ inputs.app_branch || 'dev' }}
        run: docker compose up --force-recreate --build --exit-code-from build-images

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: seedsigner-os-${{ matrix.config }}
          path: images/seedsigner_os.*.img
          retention-days: 7
          if-no-files-found: warn

      - name: Upload to GitHub Release
        if: success() && inputs.upload_to_release && inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for img in images/seedsigner_os.*.img; do
            if [ -f "$img" ]; then
              new_name="seedsigner_os-${{ matrix.config }}.img"
              gh release upload "${{ inputs.release_tag }}" "${img}#${new_name}" --clobber
            fi
          done
